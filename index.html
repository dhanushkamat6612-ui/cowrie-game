<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamat Studio - Chowkabara 4-Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Sans+Devanagari:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #FF6B35 0%, #4ECDC4 25%, #45B7D1 50%, #96CEB4 75%, #F7931E 100%);
            min-height: 100vh;
        }

        /* Boot Logo Screen */
        .boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }

        .kamat-logo {
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #FFD700, #FF6B35, #4ECDC4);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5), inset 0 0 50px rgba(255,255,255,0.1);
            animation: logoPulse 2s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .kamat-logo::before {
            content: '🇮🇳';
            font-size: 80px;
            margin-bottom: 10px;
            animation: bounce 2s ease-in-out infinite;
        }

        .kamat-logo::after {
            content: 'KAMAT\nSTUDIO';
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 3px;
            line-height: 1.2;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        /* Player Selection Screen */
        .player-select {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #FFF8E1 0%, #E8F5E8 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 40px;
        }

        .player-select h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #FF6B35, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            text-align: center;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            max-width: 800px;
            width: 100%;
            margin-bottom: 40px;
        }

        .player-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 4px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .player-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .player-card.selected {
            border-color: #FFD700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .player-card .emoji {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .player-card input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1em;
            text-align: center;
            margin-bottom: 15px;
            font-family: inherit;
        }

        .player-card input:focus {
            outline: none;
            border-color: #FF6B35;
        }

        .start-btn {
            padding: 20px 50px;
            font-size: 1.3em;
            background: linear-gradient(145deg, #FF6B35, #F7931E);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 15px 35px rgba(255, 107, 53, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 107, 53, 0.5);
        }

        /* Main Game */
        .game-container {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
        }

        .kaude-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
        }

        .kauda {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #FFF8E1, #FFECB3);
            border: 4px solid #8B4513;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: kaudaRotate 1s linear infinite;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .kauda:hover {
            transform: scale(1.1);
            animation-play-state: paused;
        }

        .kauda.rolled {
            animation: none;
            background: linear-gradient(145deg, #FFD700, #FFA500);
        }

        @keyframes kaudaRotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .current-player {
            background: rgba(255,255,255,0.9);
            padding: 20px 30px;
            border-radius: 25px;
            border: 4px solid #FFD700;
            font-size: 1.4em;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* 5x5 Spiral Board */
        .board-container {
            background: linear-gradient(145deg, #DEB887, #D2B48C);
            border-radius: 30px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: inset 0 15px 30px rgba(0,0,0,0.2), 0 20px 40px rgba(0,0,0,0.2);
            border: 6px solid #8B4513;
            position: relative;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 6px;
            margin: 0 auto;
            max-width: 500px;
            aspect-ratio: 1;
        }

        .square {
            aspect-ratio: 1;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            border: 3px solid rgba(255,255,255,0.6);
            background: linear-gradient(145deg, #F5DEB3, #DEB887);
        }

        .square:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .square.selected {
            background: linear-gradient(145deg, #FFD700, #FFA500) !important;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            transform: scale(1.15);
            z-index: 10;
        }

        .square.valid-move {
            background: linear-gradient(145deg, #90EE90, #32CD32) !important;
            box-shadow: 0 0 25px rgba(50, 205, 50, 0.7);
        }

        .square.safe {
            border-color: #FFD700;
            background: linear-gradient(145deg, #FFFACD, #FFE4B5);
        }

        .square.center {
            background: linear-gradient(145deg, #FF6B6B, #FF8E8E);
            border-color: #FF1744;
            font-size: 2.5em;
        }

        .piece {
            width: 65%;
            height: 65%;
            border-radius: 50%;
            border: 4px solid #2C1810;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            position: absolute;
            z-index: 5;
        }

        .piece.player1 { background: linear-gradient(145deg, #FF6B35, #FF8E53); }
        .piece.player2 { background: linear-gradient(145deg, #4ECDC4, #44A08D); }
        .piece.player3 { background: linear-gradient(145deg, #45B7D1, #3498DB); }
        .piece.player4 { background: linear-gradient(145deg, #96CEB4, #7CB342); }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
        }

        .btn-primary { background: linear-gradient(145deg, #FF6B35, #F7931E); }
        .btn-secondary { background: linear-gradient(145deg, #8B4513, #A0522D); }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(145deg, #FFF8E1, #FFECB3);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 4px solid #FFD700;
        }

        .modal h3 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #2C1810;
        }

        .modal-ok {
            padding: 15px 40px;
            background: linear-gradient(145deg, #FF6B35, #F7931E);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .kaude-container { top: 10px; }
            .kauda { width: 60px; height: 60px; font-size: 2em; }
            .board { gap: 4px; max-width: 350px; }
            .player-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <!-- Boot Logo -->
    <div class="boot-screen" id="bootScreen">
        <div class="kamat-logo"></div>
    </div>

    <!-- Player Selection -->
    <div class="player-select" id="playerSelect">
        <h1>🎮 Choose Players & Colors</h1>
        <div class="player-grid" id="playerGrid"></div>
        <button class="start-btn" id="startGame">Start Chowkabara!</button>
    </div>

    <!-- Main Game -->
    <div class="game-container" id="gameContainer">
        <div class="kaude-container" id="kaudeContainer"></div>
        
        <div class="game-header">
            <div class="current-player" id="currentPlayer"></div>
            <div id="throwResult"></div>
        </div>

        <div class="board-container">
            <div class="board" id="board"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="rollKauda">Roll Kauda</button>
            <button class="btn btn-secondary" id="newGame">New Game</button>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="ruleModal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalMessage"></p>
            <button class="modal-ok" id="modalOk">OK</button>
        </div>
    </div>

    <script>
        class ChowkabaraGame {
            constructor() {
                this.boardSize = 5;
                this.board = Array(25).fill(null);
                this.players = [];
                this.currentPlayerIndex = 0;
                this.selectedPawn = null;
                this.kaudaHistory = [];
                this.gameState = 'setup';
                this.playerNames = [];
                this.playerColors = ['#FF6B35', '#4ECDC4', '#45B7D1', '#96CEB4'];
                this.playerEmojis = ['🔥', '🌀', '💧', '🍃'];
                
                this.init();
            }

            init() {
                this.showBootScreen();
                this.createPlayerSelection();
                this.attachEventListeners();
            }

            showBootScreen() {
                setTimeout(() => {
                    document.getElementById('bootScreen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('bootScreen').style.display = 'none';
                        document.getElementById('playerSelect').style.display = 'flex';
                    }, 1000);
                }, 2000);
            }

            createPlayerSelection() {
                const grid = document.getElementById('playerGrid');
                const colors = [...this.playerColors];
                
                for (let i = 0; i < 4; i++) {
                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.dataset.index = i;
                    card.innerHTML = `
                        <div class="emoji">${this.playerEmojis[i]}</div>
                        <input type="text" placeholder="Player ${i+1} Name" maxlength="12">
                        <div>Color: <span style="font-size: 1.5em;">${this.playerEmojis[i]}</span></div>
                    `;
                    grid.appendChild(card);
                }

                document.getElementById('startGame').onclick = () => this.startGame();
            }

            startGame() {
                const cards = document.querySelectorAll('.player-card');
                let selectedCount = 0;
                
                cards.forEach((card, i) => {
                    const name = card.querySelector('input').value.trim() || `Player ${i+1}`;
                    if (card.classList.contains('selected')) {
                        this.players.push({
                            id: i + 1,
                            name: name,
                            pawns: Array(4).fill(-1), // -1 = home,
